- name: CheckDurationTime
  summary: Checks the timing of scan exposure intervals and, optionally, a movement
    trend.
  description: 'This method waits for a configured number of exposure appearances
    (`powerOn`) per cycle and compares the timestamp of the first exposure in each
    cycle to the previous one, ensuring the difference is within a specified tolerance
    (`expectError`) of `durationTime`. It can also sample a numeric control''s position
    after exposures to validate its trend (Increase/Decrease/Unchanged).

    Power-on detection can be done in two ways:

    1.  By polling a property (e.g., `ScanIconImage.IsOffscreen` changing from `False`
    to `True`).

    2.  By waiting for an image pattern to appear (using `sourcePath`, `rect`, `accuracy`,
    etc.).'
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlCheck.py
    class: ControlCheck
    method: CheckDurationTime
    line: '2222'
  aliases: []
  parameters:
  - name: uiControl
    type: auto.Control or str
    required: true
    description: The control used for position sampling. A string can be used if only
      image-based waits are performed.
    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Dict
    required: true
    description: 'A dictionary of parameters, including:'
    default: null
    example: null
    schema_fields: []
  returns: 'None: This method does not return a value but stores the actual result
    description and comparison result in `paramDict`.'
  examples:
  - 'For basic timing validation:'
  - cycles=10, powerOn=2, durationTime=4.0, expectError=0.5, trend='Unchanged'
  - 'For image-based detection:'
  - sourcePath='commonFiles\resource\ScanIcon.png', rect=[350,1030,490,1080]
