- name: InnerGetImageInfo
  summary: Retrieves image-related property values (such as TagNumber, ValueText,
    etc.) from the specified control.
  description: "Retrieves image-related property values (such as TagNumber, ValueText,\
    \ etc.) from the specified control.\n\nArgs:\n    uiControl (auto.Control): The\
    \ target UI control.\n    paramDict (Dict): Dictionary of parameters, commonly\
    \ including:\n        - propertyNameList (list): List of property names, usually\
    \ only the first element is used.\n        - regexList (list): List of regex parameters\
    \ for locating specific properties.\n        - tagNumberList (list): List of target\
    \ tag numbers. If empty, all property values are returned.\n\nReturns:\n    list:\
