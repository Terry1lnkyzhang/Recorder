- name: CheckExist
  summary: Determines if a UI control exists based on specified criteria.
  description: 'This method can operate in two modes:

    1. **Current-control mode (`isCurrent=True`)**: Evaluates the provided `uiControl`
    itself against property filters and optional screen placement constraints.

    2. **Child-search mode (default)**: Recursively searches through the child controls
    of `uiControl` to find matches, with options to include off-screen elements.

    The matching logic is as follows:

    - If `isExist` is True (default), the check succeeds only if exactly one matching
    control is found.

    - If `isExist` is False, the check succeeds only if zero matching controls are
    found.'
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlCheck.py
