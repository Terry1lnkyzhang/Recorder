- name: InnerGetPropertyValue
  summary: Fetch a property value from a UI control (standard or snoop mode).
  description: 'Resolution Order:

    1. Snoop path (isSnoop=True): Use framework snoop helpers to gather raw property
    (supports regexList filtering and ImageInfo special handling).

    2. Direct path: Derive value by attribute access or supported aliases (Value,
    rangeValue, childrencount, filmcount, rowcount, row/col for DataGrid & Table,
    ComboBox current selection, list/tree expansion).

    Special Keys:

    dataGrid: Requires rowIndex + (colIndex|colName) (+ dataGridProperty)

    Table: Requires rowIndex + colIndex (+ cellProperty)

    list: Expands combo/tree, returns all item texts

    combox/combobox: Returns selected value or selection item name

    Parameters:

    uiControl (auto.Control): Control from which to obtain the value.

    paramDict (Dict):

    propertyName / propertyNameList (str | list[str]): Target property name(s); first
    element used when list form.

    isSnoop (bool): Enables snoop retrieval route.

    regexList (list[str]): Optional regex selectors for snoop block list mode.

    floatPrecision (int): If >0, value coerced to float and rounded down to precision.

    colIndex / colName / rowIndex / dataGridProperty / cellProperty: Additional selectors
    for grid/table access.'
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlCheck.py
