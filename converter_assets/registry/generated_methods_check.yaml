- name: CheckOptionKeyStatus
  summary: Verifies the status of option keys in a grid-like control.
  description: 'This method reads a grid where option key names and their statuses
    (e.g., ''Opened'', ''Disable'') are displayed in different columns. It checks
    if the actual status of each specified option key matches its expected status.

    If `propertyNameList` is provided, only the keys in that list are validated. If
    `propertyNameList` is not provided, all rows in the grid are checked. Default
    expected values are inferred if `propertyValueList` is not provided (''Disable''
    for ''Precise Image Trial'', ''Opened'' for others).'
