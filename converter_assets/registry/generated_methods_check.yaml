- name: RecordProperty
  summary: Records a property value from a UI control for later use or reporting.
  description: 'This method retrieves a specified property from a UI control, which
    can be a standard attribute or a value obtained via the Snoop utility. It supports
    navigating to a related control using a `browser` expression before fetching the
    value. The recorded value can be used to populate variables for reporting.

    Supported `propertyName` values include standard control attributes and special
    keys like: `Value`, `childrencount`, `rangeValue`, `filmcount`, `rowcount`, `check`,
    `isSelected`, `combox`/`combobox`, `list`, `dataGrid`, and `Table`.'
