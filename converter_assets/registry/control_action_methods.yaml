    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Dict
    required: true
    description: A dictionary of parameters to control the scanner action.
    default: null
    example: null
    schema_fields:
    - name: funcName
      type: str
      description: The name of the scanner function to call, e.g., "Enable", "ScanKeyDown",
        "Stop".
      required: true
      default: null
      example: null
    - name: dataHex
      type: str
      description: A space-separated hex string to send, overriding the default for
        the given `funcName`.
      required: true
      default: null
      example: null
    - name: portRadio
      type: int
      description: The baud rate for the serial connection. Defaults to 115200.
      required: true
      default: null
      example: null
    - name: timeOut
      type: float
      description: Max seconds to wait when enabling the scanner while polling for
        a property change.
      required: true
      default: null
      example: null
    - name: waitPropertyName
      type: str
      description: The name of the UI property to poll on `uiControl` when enabling.
      required: true
      default: null
      example: null
    - name: waitPropertyVlaue
      type: str
      description: The target value of the property that indicates the scanner is
        ready (legacy key spelling used by current implementation).
      required: true
      default: null
      example: null
    - name: waitTime
      type: float
      description: Time to sleep after the operation.
      required: true
      default: null
      example: null
  returns: None. The method may exit early when `funcName` is unsupported.
  examples: []
  exposed_keyword: ScanDll
- name: CUS_ImageEvaluationDrawCircle
  summary: Finds concentric circles in an image and draws a debug rectangle.
  description: This custom method is designed for image evaluation tasks. It takes
    a screenshot, finds a small circle within a larger one based on area parameters,
    and then draws a scaled rectangle around the found inner circle for debugging
    and visualization purposes.
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
