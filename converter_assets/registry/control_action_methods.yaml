- name: ExistExec
  summary: Waits for a UI control to exist and then executes an action on it.
  description: This method polls for the existence of a UI control, identified either
    directly or by a key. Once the control is found, it executes a specified function
    on that control. It also includes a cancellation mechanism that can stop the wait
    if another specified window becomes interactive.
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: ExistExec
    line: '562'
  aliases: []
  parameters:
  - name: uiControl
    type: auto.Control
    required: true
    description: The target UI control. Can be a control object or a string key to
      be looked up via `ControlManager`.
    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Any
    required: true
    description: A dictionary of parameters to control the behavior.
    default: null
    example: null
    schema_fields:
    - name: key
      type: str
      description: The control key to search for if `uiControl` is a string.
      required: true
      default: null
      example: null
    - name: timeout
      type: float
      description: The maximum time in seconds to wait for the control to exist. Defaults
        to 10.0.
      required: true
      default: null
      example: null
    - name: preFoundWindowInteraction
      type: str
      description: A window key. If this window becomes interactive, the wait is cancelled.
      required: true
      default: null
      example: null
    - name: funcName
      type: str
      description: The name of the action method to execute on the found control.
      required: true
      default: null
      example: null
    - name: funcParam
      type: dict or str
      description: The parameters to pass to the action method.
      required: true
      default: null
      example: null
  returns: The direct return value from `__runFunc` when the target control is found,
    or `None` when waiting is cancelled / timed out.
  examples: []
  exposed_keyword: ExistExec
- name: SendKeys
  summary: Simulates sending keyboard input, including complex sequences.
  description: 'This method can operate in two modes: sending a rich text string with
    special key macros, or sending a single virtual key press. It can optionally click
    on a target control or coordinate before sending keys to ensure focus.'
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: SendKeys
    line: '622'
  aliases: []
  parameters:
  - name: uiControl
    type: auto.Control
    required: true
    description: The target control for the key presses. Used to determine coordinates
      for an initial click if x and y are not provided.
    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Dict
    required: true
    description: A dictionary of parameters to control the action.
    default: null
    example: null
    schema_fields:
    - name: text
      type: str
      description: A macro string with special tokens like '{Ctrl}', '{Shift}', '{a
        3}'. Mutually exclusive with 'key'.
      required: true
      default: null
      example: null
    - name: key
      type: str
      description: A single virtual key name (e.g., "VK_F5").
      required: true
      default: null
      example: null
    - name: x
      type: int
      description: The x-coordinate to click before sending keys.
      required: true
      default: null
      example: null
    - name: y
      type: int
      description: The y-coordinate to click before sending keys.
      required: true
      default: null
      example: null
    - name: interval
      type: float
      description: Delay between characters in a text string.
      required: true
      default: null
      example: null
    - name: waitTime
      type: float
      description: Time to sleep after the keys are sent.
      required: true
      default: null
      example: null
    - name: charMode
      type: bool
      description: If False, uses IME-dependent input.
      required: true
      default: null
      example: null
    - name: debug
      type: bool
      description: If True, prints the expanded key sequence.
      required: true
      default: null
      example: null
  returns: ''
  examples:
  - '`{''text'': ''{Ctrl}a{Delete}''}`: Simulates Ctrl+A, then Delete.'
  - '`{''text'': ''{Ctrl}(AB)''}`: Simulates holding Ctrl, pressing A, B, then releasing
    Ctrl.'
  - '`{''text'': ''{{}Hello{}}''}`: Sends the literal string "{Hello}".'
  exposed_keyword: SendKeys
- name: ScanDll
  summary: Simulates scanner hardware events using a DLL or serial port.
  description: This method forwards key events (e.g., ScanKeyDown, Enable) to either
    a simulator DLL or a physical device via a serial port. It can handle different
    scanner functions and automatically switch between simulation and a physical bay
    based on response times.
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: ScanDll
    line: '663'
  aliases: []
  parameters:
  - name: uiControl
    type: auto.Control
    required: true
