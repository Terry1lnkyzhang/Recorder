    \ position on the screen or a position relative to a UI control.\n\nArgs:\n  \
    \  uiControl: The UI control to move the cursor to.\n    paramDict: A dictionary\
    \ of parameters to customize the move.\n        - absolute (bool): If True, move\
    \ to absolute screen coordinates.\n        - x (int): The absolute X-coordinate.\n\
    \        - y (int): The absolute Y-coordinate.\n        - ratioX (float): The\
    \ relative X position within the control (0.0 to 1.0).\n        - ratioY (float):\
    \ The relative Y position within the control (0.0 to 1.0).\n        - waitTime\
    \ (float): Time to wait after the move."
