- name: Click
  summary: Performs a click on a UI control or at an absolute screen position.
  description: 'This method simulates a single left-click. It can operate in two modes:
    clicking on a specific UI control or clicking at absolute (x, y) coordinates on
    the screen. It supports various options like waiting for the control to be enabled,
    pressing modifier keys, and handling checkboxes intelligently.'
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: Click
    line: '231'
  aliases: []
  parameters:
  - name: uiControl
    type: auto.Control
    required: true
    description: The UI control to click. If 'absolute' is True in paramDict, this
      may be ignored.
    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Dict
    required: true
    description: A dictionary of parameters to customize the click action.
    default: null
    example: null
    schema_fields:
    - name: absolute
      type: bool
      description: If True, click at absolute screen coordinates specified by 'x'
        and 'y'.
      required: true
      default: null
      example: null
    - name: x
      type: int
      description: The absolute x-coordinate for the click.
      required: true
      default: null
      example: null
    - name: y
      type: int
      description: The absolute y-coordinate for the click.
      required: true
      default: null
      example: null
    - name: isChecked
      type: bool
      description: For checkboxes, the desired state. The click is skipped if the
        checkbox is already in this state.
      required: true
      default: null
      example: null
    - name: isEnabled
      type: bool
      description: If True, wait for the control to be enabled before clicking.
      required: true
      default: null
      example: null
    - name: pressKey
      type: str
      description: The name of a modifier key (e.g., "VK_LSHIFT") to hold down during
        the click.
      required: true
      default: null
      example: null
    - name: waitTime
      type: float
      description: Seconds to wait after the click completes.
      required: true
      default: null
      example: null
    - name: isRecordTime
      type: bool
      description: If True, records the execution start time.
      required: true
      default: null
      example: null
    - name: getClickStatus
      type: bool
      description: If True, records the button status and save the results in an Excel
        file.
      required: true
      default: null
      example: null
    - name: switchCount
      type: int
      description: This parameter represents the number of rounds of value changes
        to be recorded.
      required: true
      default: null
      example: null
    - name: CheckWaitTime
      type: float
      description: Seconds to wait for the completion of check.
      required: true
      default: null
      example: null
  returns: ''
  examples: []
  exposed_keyword: Click
