- name: init
  summary: Initializes the ControlAction singleton.
  description: This method sets up the necessary configurations and initial state
    for the ControlAction class, which is responsible for orchestrating UI automation
    actions. It configures the Tesseract OCR engine path, initializes various state-holding
    attributes, and connects to event listeners. It also attempts to load a hardware
    simulation DLL for scanner interactions.
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: init
    line: '140'
  aliases: []
  parameters: []
  returns: ''
  examples: []
  exposed_keyword: init
- name: 'Null'
  summary: A no-operation action.
  description: This method does nothing. It serves as a placeholder or a default action
    in scenarios where an action is required but no operation should be performed.
  source:
