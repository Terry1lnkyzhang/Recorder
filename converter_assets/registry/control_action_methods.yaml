        must return truthy for the conditional body to execute.
      required: true
      default: null
      example: null
    - name: controlName
      type: str | auto.Control
      description: Control key or already resolved control object used when ``uiControl``
        is a string.
      required: true
      default: null
      example: null
    - name: funcName
      type: str
      description: Name of an exposed method in ``ControlAction`` or ``ControlCheck``
        to invoke if condition passes. If omitted, the method returns the resolved
        control.
      required: true
      default: null
      example: null
    - name: funcParam
      type: str | dict
      description: Parameter specification for the target function. String form supports
        the framework's key=value comma syntax and will be parsed.
      required: true
      default: null
      example: null
    - name: Description
      type: str
      description: Optional human readable description to override downstream reporting
        metadata.
      required: true
      default: null
      example: null
    - name: Expect
      type: str
      description: Optional expected outcome text for reporting.
      required: true
      default: null
      example: null
  returns: 'Any: Return value of the invoked ``funcName`` if condition passes; if
    ``funcName`` is absent, returns the resolved ``uiControl``; returns ``None`` when
