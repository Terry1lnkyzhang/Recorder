- name: Condition
  summary: Conditionally execute an action/check function when an expression is True.
  description: 'Evaluates ``ifFormula`` (Python expression / eval-able string). If
    it

    resolves to a truthy value, optionally resolves ``controlName`` to a

    concrete UI control (when the incoming ``uiControl`` is a string), then

    dispatches the function named by ``funcName`` with its parameters

    (``funcParam``) via the internal dynamic executor ``__runFunc``.

    This is a control-flow helper used inside Excel / YAML driven test

    steps to gate an action (e.g. Click / Edit / CheckExists) behind a

    runtime condition without needing to duplicate testcase rows.'
