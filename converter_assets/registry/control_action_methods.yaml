    \        - matchIndex (int, optional): Target index in match list. Supports negative\
    \ index. Defaults to 0.\n        - returnMatch (bool, optional): If True, returns\
    \ matched detail dict instead of bool.\n        - Other OCR parameters are forwarded\
    \ to `FindTextByOCRWindows`. Forwarded defaults: ``matchMode='exact'``, ``lang='en-US'``,\
    \ ``preprocess='ui'``, ``postCorrectUI=True``, ``returnAll=True``.\n        -\
    \ Other click parameters (such as `pressKey`, `waitTime`) are forwarded to `Click`.\n\
    \nReturns:\n    bool on normal mode, or matched detail dict when `returnMatch=True`.\n\
    \    Returns False when no valid match is found."
