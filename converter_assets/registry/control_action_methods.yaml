    \ timeout (float, optional): Max wait time in seconds. Defaults to 30.\n     \
    \   - interval (float, optional): Polling interval in seconds. Defaults to 0.5.\n\
    \        - stableCount (int, optional): Number of consecutive successful polls\
    \ required to pass. Defaults to 1.\n        - returnMatch (bool, optional): When\
    \ waiting for appearance and matched, return matched detail instead of bool.\n\
    \        - returnAllMatch (bool, optional): When used with `returnMatch=True`,\
    \ returns whole match list.\n        - matchIndex (int, optional): Target index\
    \ when returning a single match.\n        - Other OCR parameters are forwarded\
    \ to `FindTextByOCRWindows`. Forwarded defaults: ``matchMode='exact'``, ``lang='en-US'``,\
