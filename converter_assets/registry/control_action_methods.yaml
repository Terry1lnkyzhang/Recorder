- name: WaitTime
  summary: 'Pauses execution for a specified duration or until a specific time. This
    method provides two ways to wait: for a fixed interval or until a given epoch
    timestamp is reached.'
  description: "Pauses execution for a specified duration or until a specific time.\
    \ This method provides two ways to wait: for a fixed interval or until a given\
    \ epoch timestamp is reached.\n\nArgs:\n    uiControl: The UI control (not directly\
    \ used, for consistency).\n    paramDict: A dictionary of parameters.\n      \
    \  - waitTime (float): The number of seconds to sleep.\n        - waitUntil (float):\
    \ An epoch timestamp. The method will loop until the current time is greater than\
    \ or equal to this value."
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
