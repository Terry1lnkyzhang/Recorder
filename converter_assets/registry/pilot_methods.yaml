- name: GetScreenShot
  summary: Captures a screenshot of the entire screen or a specified region.
  description: This method saves a screenshot as a PNG file. The screenshot can be
    of the full screen, a specific rectangular area, or the area of a given UI control.
  source:
    path: Y:\ATFramework\CT_SV_SW\ATFramework\Main\Operation\ControlAction.py
    class: ControlAction
    method: GetScreenShot
    line: '4405'
  aliases:
  - getScreenshot
  parameters:
  - name: uiControl
    type: auto.Control
    required: true
    description: A UI control object. If 'rect' is not provided, this control's bounding
      rectangle will be used as the capture area.
    default: null
    example: null
    schema_fields: []
  - name: paramDict
    type: Dict
    required: true
    description: A dictionary of parameters for the screenshot.
    default: null
    example: null
    schema_fields:
    - name: filePath
      type: str
      description: Target save path. When only a file name is provided, the image
        is saved under `ConfigManager().resultDirectory`.
      required: true
      default: null
      example: null
    - name: rect
      type: list[int]
      description: A list of four integers [left, top, right, bottom] defining the
        region to capture. If provided, this takes precedence over the uiControl's
        area. If not provided, the full screen is captured unless a valid uiControl
        is passed.
      required: false
      default: null
      example: null
  returns: The captured screenshot as a PIL Image object.
  examples: []
  exposed_keyword: GetScreenShot
